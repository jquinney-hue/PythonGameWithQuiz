<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; overflow:hidden; background: transparent; display: flex; align-items: center; justify-content: center; min-height: 220px; }
  .wrap { position: relative; width: 200px; height: 220px; }
  .shatter { display: none; position: absolute; top: 0; left: 0; width: 200px; height: 220px; }

  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    10%      { transform: translate(-3px, 1px); }
    20%      { transform: translate(3px, -1px); }
    30%      { transform: translate(-4px, 2px); }
    40%      { transform: translate(4px, -2px); }
    50%      { transform: translate(-5px, 1px); }
    60%      { transform: translate(5px, -1px); }
    70%      { transform: translate(-4px, 2px); }
    80%      { transform: translate(3px, -2px); }
    90%      { transform: translate(-2px, 1px); }
  }
  .ice-body {
    transform-origin: 100px 130px;
    animation: shake 0.15s ease-in-out infinite;
    animation-delay: 1.4s;
    animation-play-state: paused;
  }
  .ice-body.shaking { animation-play-state: running; }
</style>
</head>
<body>
<div class="wrap">
  <svg id="ice-svg" viewBox="0 0 200 220" width="200" height="220">
    <defs>
      <linearGradient id="icefill" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#d0f4ff"/>
        <stop offset="50%" stop-color="#7de8ff"/>
        <stop offset="100%" stop-color="#3ab8d8"/>
      </linearGradient>
      <linearGradient id="iceshine" x1="0%" y1="0%" x2="60%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <g class="ice-body" id="ice-body">
      <!-- Main block -->
      <rect x="52" y="70" width="96" height="110" rx="6" fill="url(#icefill)" stroke="#5cc8e8" stroke-width="2"/>
      <!-- Shine overlay -->
      <rect x="52" y="70" width="96" height="110" rx="6" fill="url(#iceshine)"/>
      <!-- Inner depth lines -->
      <line x1="72" y1="70" x2="64" y2="180" stroke="#a0e4f8" stroke-width="1" opacity="0.6"/>
      <line x1="100" y1="70" x2="100" y2="180" stroke="#a0e4f8" stroke-width="1" opacity="0.4"/>
      <line x1="128" y1="70" x2="136" y2="180" stroke="#a0e4f8" stroke-width="1" opacity="0.6"/>
      <line x1="52" y1="100" x2="148" y2="100" stroke="#a0e4f8" stroke-width="1" opacity="0.4"/>
      <line x1="52" y1="140" x2="148" y2="140" stroke="#a0e4f8" stroke-width="1" opacity="0.4"/>
      <!-- Crack lines (appear during shake via CSS) -->
      <polyline points="90,90 100,110 88,130 98,155" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      <polyline points="115,80 108,105 118,125" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
      <!-- Top face -->
      <rect x="52" y="68" width="96" height="10" rx="3" fill="#b8f0ff" opacity="0.6"/>
      <!-- Small glint -->
      <ellipse cx="75" cy="88" rx="8" ry="5" fill="#ffffff" opacity="0.45" transform="rotate(-20,75,88)"/>
    </g>
  </svg>

  <!-- Shatter SVG -->
  <svg class="shatter" id="shatter-svg" viewBox="0 0 200 220" width="200" height="220">
    <!-- Crystal shards flying outward from centre 100,125 -->

    <!-- Shard 1: up -->
    <polygon points="100,125 94,115 106,115" fill="#7de8ff" stroke="#3ab8d8" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;-5,-70" dur="0.6s" begin="0s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0.2s" fill="freeze"/>
    </polygon>

    <!-- Shard 2: up-right -->
    <polygon points="100,125 110,110 120,122" fill="#b8f0ff" stroke="#5cc8e8" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;55,-55" dur="0.55s" begin="0.03s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.55s" begin="0.2s" fill="freeze"/>
    </polygon>

    <!-- Shard 3: right -->
    <polygon points="100,125 115,120 112,135" fill="#7de8ff" stroke="#3ab8d8" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;72,-5" dur="0.6s" begin="0.02s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0.15s" fill="freeze"/>
    </polygon>

    <!-- Shard 4: down-right -->
    <polygon points="100,125 114,135 102,148" fill="#d0f4ff" stroke="#5cc8e8" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;50,55" dur="0.55s" begin="0.04s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.55s" begin="0.2s" fill="freeze"/>
    </polygon>

    <!-- Shard 5: down -->
    <polygon points="100,125 94,140 106,140" fill="#7de8ff" stroke="#3ab8d8" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,68" dur="0.6s" begin="0s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0.2s" fill="freeze"/>
    </polygon>

    <!-- Shard 6: down-left -->
    <polygon points="100,125 86,138 98,148" fill="#b8f0ff" stroke="#5cc8e8" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;-50,55" dur="0.55s" begin="0.03s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.55s" begin="0.2s" fill="freeze"/>
    </polygon>

    <!-- Shard 7: left -->
    <polygon points="100,125 85,118 88,133" fill="#7de8ff" stroke="#3ab8d8" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;-72,-5" dur="0.6s" begin="0.02s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0.15s" fill="freeze"/>
    </polygon>

    <!-- Shard 8: up-left -->
    <polygon points="100,125 88,112 80,122" fill="#d0f4ff" stroke="#5cc8e8" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0,0;-55,-55" dur="0.55s" begin="0.04s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.55s" begin="0.2s" fill="freeze"/>
    </polygon>

    <!-- Tiny crystal fragments -->
    <polygon points="100,105 97,98 103,98" fill="#ffffff" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,0;-20,-80" dur="0.5s" begin="0.05s" fill="freeze"/>
      <animate attributeName="opacity" values="0.9;0" dur="0.5s" begin="0.1s" fill="freeze"/>
    </polygon>
    <polygon points="100,145 97,153 103,153" fill="#ffffff" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,0;15,75" dur="0.5s" begin="0.05s" fill="freeze"/>
      <animate attributeName="opacity" values="0.9;0" dur="0.5s" begin="0.1s" fill="freeze"/>
    </polygon>
    <polygon points="118,115 115,108 121,110" fill="#ffffff" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" values="0,0;65,-40" dur="0.5s" begin="0.06s" fill="freeze"/>
      <animate attributeName="opacity" values="0.8;0" dur="0.5s" begin="0.1s" fill="freeze"/>
    </polygon>
    <polygon points="82,115 79,108 85,110" fill="#ffffff" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" values="0,0;-65,-40" dur="0.5s" begin="0.06s" fill="freeze"/>
      <animate attributeName="opacity" values="0.8;0" dur="0.5s" begin="0.1s" fill="freeze"/>
    </polygon>
    <polygon points="118,138 115,146 121,143" fill="#d0f4ff" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,0;60,50" dur="0.5s" begin="0.04s" fill="freeze"/>
      <animate attributeName="opacity" values="0.9;0" dur="0.5s" begin="0.15s" fill="freeze"/>
    </polygon>
    <polygon points="82,138 79,146 85,143" fill="#d0f4ff" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,0;-60,50" dur="0.5s" begin="0.04s" fill="freeze"/>
      <animate attributeName="opacity" values="0.9;0" dur="0.5s" begin="0.15s" fill="freeze"/>
    </polygon>

    <!-- Flash -->
    <rect x="40" y="60" width="120" height="130" rx="6" fill="#d0f4ff" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="0.2s" begin="0s" fill="freeze"/>
    </rect>
  </svg>
</div>

<script>
  setTimeout(() => {
    document.getElementById('ice-body').classList.add('shaking');
  }, 1400);

  setTimeout(() => {
    document.getElementById('ice-svg').style.display = 'none';
    const sh = document.getElementById('shatter-svg');
    sh.style.display = 'block';
    sh.querySelectorAll('animate, animateTransform').forEach(a => a.beginElement());
  }, 2200);
</script>
</body>
</html>
